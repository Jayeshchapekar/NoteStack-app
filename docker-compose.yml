version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
         - VITE_API_URL=/api
    ports:
      - "8080:80"
    depends_on:
     - backend
